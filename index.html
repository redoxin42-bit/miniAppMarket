<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRYPTOXRM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #000000;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-blur: blur(36px) saturate(200%);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 4px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.45);
            --icon-active: #ffffff;
            --icon-inactive: rgba(255, 255, 255, 0.30);
            --nav-bg: rgba(0, 0, 0, 0.70);
            --nav-blur: blur(40px);
            --nav-border: 1px solid rgba(255,255,255,0.06);
            --spot-color: rgba(255, 255, 255, 0.03);
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-blur: blur(32px) saturate(180%);
            --glass-border: 1px solid rgba(255, 255, 255, 0.95);
            --glass-shadow: 0 4px 32px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,1);
            --text: #000000;
            --text-secondary: rgba(0, 0, 0, 0.45);
            --icon-active: #000000;
            --icon-inactive: rgba(0, 0, 0, 0.30);
            --nav-bg: rgba(255, 255, 255, 0.70);
            --nav-blur: blur(40px);
            --nav-border: 1px solid rgba(0,0,0,0.06);
            --spot-color: rgba(0, 0, 0, 0.02);
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.4s ease, color 0.4s ease, border 0.4s ease;
        }

        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

        #splash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000000;
            z-index: 10000; display: flex; justify-content: center; align-items: center;
            opacity: 1; transition: opacity 0.45s ease-in;
        }
        .splash-letter { display: inline-block; font-weight: 100; font-size: 56px; letter-spacing: 0.18em; color: #ffffff; opacity: 0; transition: all 0.5s ease; transform: translateY(-20px); }
        .letter-animate { opacity: 1; transform: translateY(0); }

        #app-content { height: 100%; overflow-y: auto; padding-bottom: 260px; -webkit-overflow-scrolling: touch; opacity: 0; transform: translateY(10px); transition: all 0.35s ease; }
        .content-ready { opacity: 1 !important; transform: translateY(0) !important; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: var(--glass-border); font-weight: 300; }
        .theme-toggle { width: 38px; height: 38px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: var(--glass-border); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .theme-toggle svg { width: 18px; height: 18px; fill: var(--text); }

        .glass-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: var(--glass-border); box-shadow: var(--glass-shadow); }
        .page { position: absolute; left: 0; top: 72px; width: 100%; opacity: 0; pointer-events: none; transform: translateY(10px); transition: all 0.22s ease; }
        .page.active { position: relative; top: 0; opacity: 1; pointer-events: auto; transform: translateY(0); }

        .hero-panel { margin: 16px; padding: 32px 24px; border-radius: 24px; text-align: center; }
        .hero-title { font-weight: 100; letter-spacing: 0.2em; font-size: 28px; }
        
        .market-grid { padding: 0 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .empty-text { text-align: center; padding: 40px; opacity: 0.4; font-size: 14px; grid-column: span 2; font-weight: 300; }

        /* ИСПРАВЛЕННЫЙ БЛОК ОПЛАТЫ */
        .cart-footer {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            width: 310px; padding: 16px; border-radius: 24px;
            display: flex; flex-direction: column; gap: 12px; z-index: 9998;
        }
        .payment-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-pay-method { padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: var(--text); font-size: 12px; cursor: pointer; }
        .btn-pay-method.selected { border-color: var(--text); background: var(--glass-bg); font-weight: bold; }
        .btn-checkout { width: 100%; padding: 12px; border-radius: 14px; background: var(--text); color: var(--bg); border: none; font-weight: 500; cursor: pointer; }

        .nav-bar {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            width: 310px; height: 64px; border-radius: 24px;
            background: var(--nav-bg); backdrop-filter: var(--nav-blur); border-top: var(--nav-border);
            display: flex; justify-content: space-around; align-items: center; z-index: 9999;
        }
        .nav-item { display: flex; align-items: center; justify-content: center; width: 50px; height: 100%; cursor: pointer; position: relative; }
        .nav-icon { width: 22px; height: 22px; fill: var(--text); opacity: 0.3; }
        .nav-icon.active { opacity: 1; }
        .badge { position: absolute; top: 12px; right: 6px; background: var(--text); color: var(--bg); font-size: 9px; font-weight: bold; padding: 1px 5px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="splash">
        <div id="splash-text">
            <span class="splash-letter">C</span><span class="splash-letter">R</span><span class="splash-letter">Y</span><span class="splash-letter">P</span><span class="splash-letter">T</span><span class="splash-letter">O</span>
        </div>
    </div>

    <div id="app-content">
        <div class="top-bar">
            <div class="avatar" id="user-avatar">U</div>
            <div id="user-name">@username</div>
            <div class="theme-toggle" onclick="toggleTheme()">
                <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
            </div>
        </div>

        <div id="page-market" class="page active">
            <div class="hero-panel glass-card">
                <div class="hero-title">CRYPTOXRM</div>
            </div>
            <div class="market-grid" id="market-products">
                <div class="empty-text">Витрина пуста. Добавьте товары через базу данных.</div>
            </div>
        </div>

        <div id="page-cart" class="page">
            <div id="cart-items-container">
                <div class="empty-text" style="grid-column: 1;">Корзина пуста</div>
            </div>
        </div>
    </div>

    <div class="cart-footer glass-card" id="cart-footer-panel" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <span style="font-size:12px; opacity:0.6;">К оплате:</span>
            <span style="font-size:18px; font-weight:300;" id="cart-total-amount">0 USD</span>
        </div>
        <div class="payment-methods">
            <button class="btn-pay-method selected" id="method-stars" onclick="setPaymentMethod('stars')">⭐ Stars</button>
            <button class="btn-pay-method" id="method-cryptobot" onclick="setPaymentMethod('cryptobot')">⚡ CryptoBot</button>
        </div>
        <button class="btn-checkout" onclick="checkoutOrder()">Оплатить</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="switchTab('market', this)"><svg class="nav-icon active" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg></div>
        <div class="nav-item" onclick="switchTab('cart', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2zm-8.9-5.1l1.1-2h7.45c.75 0 1.41-.41 1.75-1.03L21.42 4.5c.17-.3.08-.67-.22-.84-.1-.05-.21-.08-.32-.08H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42l1.1-2z"/></svg>
            <div class="badge" id="cart-badge" style="display:none;">0</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentUserId = tg.initDataUnsafe?.user?.id || 12345678;
        let cart = [];
        let selectedMethod = 'stars';

        window.addEventListener('DOMContentLoaded', () => {
            const letters = document.querySelectorAll('.splash-letter');
            letters.forEach((l, idx) => setTimeout(() => l.classList.add('letter-animate'), idx * 60));
            
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('app-content').classList.add('content-ready');
                }, 450);
            }, 1000);

            loadMarket();
        });

        function toggleTheme() {
            const body = document.body;
            if(body.getAttribute('data-theme') === 'light') body.removeAttribute('data-theme');
            else body.setAttribute('data-theme', 'light');
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            el.querySelector('.nav-icon').classList.add('active');
            
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${tabId}`).classList.add('active');

            document.getElementById('cart-footer-panel').style.display = (tabId === 'cart' && cart.length > 0) ? 'flex' : 'none';
        }

        function setPaymentMethod(method) {
            selectedMethod = method;
            document.getElementById('method-stars').classList.toggle('selected', method === 'stars');
            document.getElementById('method-cryptobot').classList.toggle('selected', method === 'cryptobot');
        }

        async function loadMarket() {
            try {
                const res = await fetch(`/api/products`);
                const products = await res.json();
                const container = document.getElementById('market-products');
                if(products.length > 0) {
                    container.innerHTML = '';
                    products.forEach(p => {
                        container.innerHTML += `
                            <div class="product-card glass-card">
                                <img src="${p.img || ''}" style="width:100%; border-radius:12px;">
                                <div style="margin-top:8px;">${p.title}</div>
                                <div style="font-weight:bold; margin:4px 0;">$${p.price}</div>
                                <button class="btn-checkout" style="padding:6px; font-size:12px;" onclick="addToCart(${p.id}, '${p.title}', ${p.price})">Купить</button>
                            </div>`;
                    });
                }
            } catch(e) { console.error("Ошибка загрузки витрины", e); }
        }

        function addToCart(id, title, price) {
            cart.push({id, title, price});
            document.getElementById('cart-badge').innerText = cart.length;
            document.getElementById('cart-badge').style.display = 'block';
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';
            let total = 0;
            cart.forEach(i => {
                total += i.price;
                container.innerHTML += `<div class="glass-card" style="padding:12px; margin:8px 16px; border-radius:12px;">${i.title} — $${i.price}</div>`;
            });
            document.getElementById('cart-total-amount').innerText = `$${total}`;
        }

        async function checkoutOrder() {
            const total = cart.reduce((acc, i) => acc + i.price, 0);
            try {
                const res = await fetch(`/api/order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: currentUserId, total_amount: total, method: selectedMethod })
                });
                const resData = await res.json();
                if(resData.success) {
                    tg.showPopup({ message: `Счет создан через ${selectedMethod}. Оплатите в боте.` });
                    cart = [];
                    updateCartUI();
                    document.getElementById('cart-badge').style.display = 'none';
                    document.getElementById('cart-footer-panel').style.display = 'none';
                }
            } catch(e) { tg.showPopup({ message: "Ошибка соединения." }); }
        }
    </script>
</body>
</html>
