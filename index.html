<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRYPTOXRM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #000000;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-blur: blur(36px) saturate(200%);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 4px 40px rgba(0,0,0,0.6);
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.45);
            --nav-bg: rgba(0, 0, 0, 0.70);
            --nav-blur: blur(40px);
        }
        [data-theme="light"] {
            --bg: #ffffff;
            --glass-bg: rgba(0, 0, 0, 0.04);
            --glass-blur: blur(32px);
            --glass-border: 1px solid rgba(0, 0, 0, 0.08);
            --glass-shadow: 0 4px 32px rgba(0,0,0,0.05);
            --text: #000000;
            --text-secondary: rgba(0, 0, 0, 0.45);
            --nav-bg: rgba(255, 255, 255, 0.70);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; height: 100vh; }
        
        #app-content { padding: 16px; padding-bottom: 240px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: #fff; border: var(--glass-border); object-fit: cover; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; }
        
        .glass-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: var(--glass-border); box-shadow: var(--glass-shadow); padding: 20px; border-radius: 24px; margin-bottom: 16px; }
        
        .page { display: none; }
        .page.active { display: block; }
        
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .product-card { text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 14px 0; text-align: center; }
        .stat-box { padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.02); }

        .cart-footer { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 340px; z-index: 998; }
        .payment-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .btn-pay { padding: 10px; border-radius: 12px; background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--text); cursor: pointer; }
        .btn-pay.selected { background: var(--text); color: var(--bg); font-weight: bold; }
        .btn-main { width: 100%; padding: 12px; border-radius: 14px; background: var(--text); color: var(--bg); border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }

        .nav-bar { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 340px; height: 60px; border-radius: 20px; background: var(--nav-bg); backdrop-filter: var(--nav-blur); display: flex; justify-content: space-around; align-items: center; z-index: 999; border: var(--glass-border); }
        .nav-item { width: 50px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.4; position: relative; }
        .nav-item.active { opacity: 1; }
        .nav-icon { width: 22px; height: 22px; fill: var(--text); }
        .badge { position: absolute; top: 10px; right: 4px; background: red; color: white; font-size: 9px; padding: 2px 5px; border-radius: 50%; }
        .empty-text { opacity: 0.4; text-align: center; padding: 40px 0; font-weight: 300; width: 100%; grid-column: span 2; }
    </style>
</head>
<body>

    <div id="app-content">
        <div class="top-bar">
            <div class="user-info">
                <div id="avatar-container">
                    <div class="avatar" id="txt-avatar">U</div>
                </div>
                <div>
                    <h4 id="user-display-name">Загрузка...</h4>
                    <p style="font-size: 12px; opacity: 0.5;" id="user-handle">@username</p>
                </div>
            </div>
        </div>

        <div id="page-market" class="page active">
            <div class="market-grid" id="market-products">
                <div class="empty-text">Витрина пуста. Перейдите в бота и добавьте через /admin.</div>
            </div>
        </div>

        <div id="page-refs" class="page">
            <div class="glass-card">
                <h3>Реферальная программа</h3>
                <p style="font-size:13px; opacity:0.6; margin-top:6px;">Приглашайте друзей и получайте бонусы за их покупки.</p>
                <div class="stat-grid">
                    <div class="stat-box"><b id="ref-count">0</b><br><span style="font-size:10px; opacity:0.5;">Приглашено</span></div>
                    <div class="stat-box"><b>XRP</b><br><span style="font-size:10px; opacity:0.5;">Валюта</span></div>
                    <div class="stat-box"><b id="ref-bonus">0</b><br><span style="font-size:10px; opacity:0.5;">Бонусы</span></div>
                </div>
                <button class="btn-main" onclick="copyRefLink()">Скопировать ссылку</button>
            </div>
            <div class="glass-card">
                <h4>Ваши рефералы:</h4>
                <div id="referrals-list" style="margin-top:10px; font-size:14px;"></div>
            </div>
        </div>

        <div id="page-cart" class="page">
            <div id="cart-items-list">
                <div class="empty-text">В корзине пусто</div>
            </div>
        </div>

        <div id="page-profile" class="page">
            <div class="glass-card" style="text-align: center;">
                <h2 style="font-weight:300;" id="prof-balance">0.00 USD</h2>
                <p style="font-size:12px; opacity:0.5;">Личный баланс</p>
            </div>
            <div class="glass-card">
                <h4>История операций:</h4>
                <div id="orders-list" style="margin-top:10px; font-size:13px; opacity:0.7;"></div>
            </div>
        </div>
    </div>

    <div class="cart-footer glass-card" id="cart-settlement" style="display:none;">
        <div style="display:flex; justify-content:between; align-items:center;">
            <span style="font-size:13px; opacity:0.6;">Итого:</span>
            <span style="font-size:18px; font-weight:bold; margin-left:auto;" id="total-price-lbl">$0</span>
        </div>
        <div class="payment-methods">
            <button class="btn-pay selected" id="p-stars" onclick="setMethod('stars')">⭐ Stars</button>
            <button class="btn-pay" id="p-crypto" onclick="setMethod('cryptobot')">⚡ CryptoBot</button>
        </div>
        <button class="btn-main" onclick="payNow()">Оформить заказ</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="tab('market', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
        <div class="nav-item" onclick="tab('refs', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 1.34 5 3s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg></div>
        <div class="nav-item" onclick="tab('cart', this)">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2zm-8.9-5.1l1.1-2h7.45c.75 0 1.41-.41 1.75-1.03L21.42 4.5c.17-.3.08-.67-.22-.84-.1-.05-.21-.08-.32-.08H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42l1.1-2z"/></svg>
            <div class="badge" id="cart-badge" style="display:none;">0</div>
        </div>
        <div class="nav-item" onclick="tab('profile', this)"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/></svg></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Извлекаем реальные данные из Telegram WebApp API
        let userId = tg.initDataUnsafe?.user?.id || 999999;
        let firstName = tg.initDataUnsafe?.user?.first_name || "Покупатель";
        let userHandle = tg.initDataUnsafe?.user?.username ? '@' + tg.initDataUnsafe?.user?.username : "@unknown";
        let photoUrl = tg.initDataUnsafe?.user?.photo_url;

        let cart = [];
        let payMethod = 'stars';

        // Инициализация интерфейса реальными данными
        document.getElementById('user-display-name').innerText = firstName;
        document.getElementById('user-handle').innerText = userHandle;
        
        if(photoUrl) {
            document.getElementById('avatar-container').innerHTML = `<img src="${photoUrl}" class="avatar">`;
        } else {
            document.getElementById('txt-avatar').innerText = firstName.charAt(0).toUpperCase();
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadMarket();
            loadUserData();
        });

        function tab(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            
            document.getElementById('cart-settlement').style.display = (id === 'cart' && cart.length > 0) ? 'block' : 'none';
        }

        async function loadMarket() {
            const res = await fetch('/api/products');
            const data = await res.json();
            const container = document.getElementById('market-products');
            if(data.length > 0) {
                container.innerHTML = '';
                data.forEach(p => {
                    container.innerHTML += `
                        <div class="glass-card product-card">
                            <img src="${p.img || 'https://placehold.co/150'}" style="width:100%; border-radius:12px; height:110px; object-fit:cover;">
                            <div style="margin: 8px 0 4px 0; font-size:14px;">${p.title}</div>
                            <div style="font-weight:bold; margin-bottom:8px;">$${p.price}</div>
                            <button class="btn-main" style="padding:6px; font-size:12px;" onclick="addToCart(${p.id}, '${p.title}', ${p.price})">В корзину</button>
                        </div>`;
                });
            }
        }

        async function loadUserData() {
            const res = await fetch(`/api/user/${userId}`);
            const data = await res.json();
            
            document.getElementById('prof-balance').innerText = `$${data.balance.toFixed(2)}`;
            document.getElementById('ref-count').innerText = data.invited_count;
            document.getElementById('ref-bonus').innerText = (data.invited_count * 1500) + " XRP"; // старый баланс

            // Рендерим рефералов
            const refList = document.getElementById('referrals-list');
            if(data.referrals.length === 0) refList.innerHTML = "<span style='opacity:0.4'>Нет приглашенных</span>";
            else {
                refList.innerHTML = data.referrals.map(r => `<div style='margin-bottom:6px;'>👤 @${r.username}</div>`).join('');
            }

            // Рендерим историю
            const ordList = document.getElementById('orders-list');
            if(data.orders.length === 0) ordList.innerHTML = "<span style='opacity:0.4'>История покупок пуста</span>";
            else {
                ordList.innerHTML = data.orders.map(o => `<div>📦 Заказ #${o.id} на сумму $${o.total_amount} (${o.payment_method})</div>`).join('');
            }
        }

        function addToCart(id, title, price) {
            cart.push({id, title, price});
            document.getElementById('cart-badge').innerText = cart.length;
            document.getElementById('cart-badge').style.display = 'block';
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list');
            if(cart.length === 0) {
                list.innerHTML = '<div class="empty-text">В корзине пусто</div>';
                document.getElementById('cart-settlement').style.display = 'none';
                return;
            }
            list.innerHTML = cart.map((item, index) => `
                <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>${item.title}</div>
                    <div style="font-weight:bold;">$${item.price}</div>
                </div>
            `).join('');
            
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price-lbl').innerText = `$${total.toFixed(2)}`;
        }

        function setMethod(m) {
            payMethod = m;
            document.getElementById('p-stars').classList.toggle('selected', m === 'stars');
            document.getElementById('p-crypto').classList.toggle('selected', m === 'cryptobot');
        }

        async function payNow() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            const res = await fetch('/api/order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId, total_amount: total, method: payMethod })
            });
            if(res.ok) {
                tg.showPopup({ title: "Успешно", message: `Счет оформлен через ${payMethod}. Оплатите его в боте.` });
                cart = [];
                updateCartUI();
                document.getElementById('cart-badge').style.display = 'none';
                loadUserData();
            }
        }

        function copyRefLink() {
            let link = `https://t.me/cryptoxrm_bot?start=ref${userId}`;
            navigator.clipboard.writeText(link);
            tg.showPopup({ message: "Ссылка скопирована!" });
        }
    </script>
</body>
</html>
